<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Flashcards (Set Creation)</title>
  <base href="../"/>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div id="cards-list-panel">
    <p id="cards-list-label">Cards:</p>
    <div id="cards-list">
      <div class="card-edit">
        <p class="card-edit-label" id="card-edit-label-1">Card 1:</p>
        <input type="text" placeholder="Term" id="term-edit-1">
        <input type="text" placeholder="Answer" id="answer-edit-1">
        <button class="card-edit-delete-button" id="card-edit-delete-button-1">Delete</button>
      </div>
    </div>
    <button id="add-card-edit-button">Add card</button>
  </div>
  <script src="set_creation/script.js"></script>
</body>

</html>
