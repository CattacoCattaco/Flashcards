<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Flashcards</title>
  <base href="../"/>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div id="flashcard">
    <span class="flashcard-text" id="flashcard-text"></span>
    <button class="flip-card-button" onclick="flipCard()"></button>
  </div>
  <div id="button-row">
    <button class="button-row-button" id="prev-button" onclick="prevCard()">
      <img src="images/prev-button.svg" class="button-image"/>
    </button>
    <button class="button-row-button" id="next-button" onclick="nextCard()">
      <img src="images/next-button.svg" class="button-image"/>
    </button>
    <button class="button-row-button" id="correct-button" onclick="correct()" color="green">
      <img src="images/correct-button.svg" class="button-image"/>
    </button>
    <button class="button-row-button" id="wrong-button" onclick="incorrect()" color="red">
      <img src="images/wrong-button.svg" class="button-image"/>
    </button>
    <button class="button-row-button" id="reclassify-button" onclick="reclassifyPrevious()" color="red">
      <img src="images/wrong-button.svg" class="button-image"/>
    </button>
  </div>
  <script src="cards/script.js"></script>
</body>

</html>
